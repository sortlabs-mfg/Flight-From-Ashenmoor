/* Build action list by injecting combo skill into slot xs */
function buildActions(raceId,clsId){
  const base=JSON.parse(JSON.stringify(CCLASSES[clsId].base));
  const cls=CLASSES.find(c=>c.id===clsId);
  const combo=cls.comboSkills[raceId];
  if(combo&&!combo.passive&&combo.skill){
    // replace last action with combo skill
    base[base.length-1]=combo.skill;
  }
  return base;
}

let W='title';
let sel={race:null,cls:null,prof:null,dest:null};
let J={};   // journey state
let C={};   // combat state

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const cl=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function go(s){W=s;render();}

function getComboSkill(){
  if(!sel.race||!sel.cls)return null;
  const cls=CLASSES.find(c=>c.id===sel.cls);
  return cls.comboSkills[sel.race]||null;
}

function initJ(){
  const r=RACES.find(x=>x.id===sel.race),c=CLASSES.find(x=>x.id===sel.cls),
        p=PROFESSIONS.find(x=>x.id===sel.prof),d=DESTINATIONS.find(x=>x.id===sel.dest);
  let b={health:100,food:50,gold:40,morale:70};
  [r.bonus,c.bonus,p.bonus].forEach(bx=>Object.entries(bx).forEach(([k,v])=>{b[k]=(b[k]||0)+v;}));
  Object.keys(b).forEach(k=>{b[k]=cl(b[k],0,k==='gold'?999:100);});

  // Base days = dist * 3 + 3
  let baseDays=d.dist*3+3;
  // Race travel mod
  if(r.travelMod){
    if(r.travelMod.terrain){
      if(d.id===r.travelMod.terrain) baseDays+=r.travelMod.daysBonus;
    } else {
      baseDays+=r.travelMod.daysBonus;
    }
  }
  // Ranger class: -1 day
  if(c.travelMod) baseDays+=c.travelMod.daysBonus||0;
  baseDays=Math.max(3,baseDays);

  J={race:sel.race,cls:sel.cls,prof:sel.prof,dest:sel.dest,
     charImg:charImgSrc(sel.race,sel.cls),
     charIcon:(r.icon+' '+c.icon),
     comboSkill:getComboSkill(),
     rageCount:0, wardDrumTurns:0, freeRoundUsed:false, bossSpawned:false,
     health:b.health,food:b.food,gold:b.gold,morale:b.morale,
     day:1,daysLeft:baseDays,maxDays:baseDays,
     log:['Your flight from Ashenmoor begins!'],ev:null,
     robj:r,cobj:c,pobj:p,dobj:d,alive:true,arrived:false};
}

function hc(v,m){const p=v/m;return p>.5?'#1d9e75':p>.25?'#ef9f27':'#e24b4a';}
function sbar(lbl,v,m){const p=Math.round(v/m*100);return'<div class="srow"><span class="slbl">'+lbl+'</span><div class="bwrap"><div class="bfill" style="width:'+p+'%;background:'+hc(v,m)+'"></div></div><span class="sval">'+Math.round(v)+'</span></div>';}

function applyEff(e){
  if(e.health)J.health=cl(J.health+e.health,0,100);
  if(e.food)J.food=cl(J.food+e.food,0,120);
  if(e.gold)J.gold=cl(J.gold+e.gold,0,999);
  if(e.morale)J.morale=cl(J.morale+e.morale,0,100);
  if(e.days)J.daysLeft=Math.max(1,J.daysLeft+e.days);
}

function advDay(){
  J.day++;J.daysLeft--;
  J.food=Math.max(0,J.food-8);
  if(J.food===0)J.health=Math.max(0,J.health-12);
  if(J.morale<30)J.health=Math.max(0,J.health-4);
  if(J.food>40)J.morale=cl(J.morale+2,0,100);

  // Dwarf sickness resistance
  const robj=J.robj,cobj=J.cobj;
  const sickRoll=robj.sickResist||0;

  // Cleric daily heal
  if(cobj.id==='cleric'){
    const cs=J.comboSkill;
    const heal=(cs&&cs.dailyHeal)||cobj.dailyHeal||3;
    J.health=cl(J.health+heal,0,100);
    J.log.push('Divine grace restores '+heal+' HP.');
  }
  // Human knight daily heal
  if(J.comboSkill&&J.comboSkill.name==='Lionheart'){
    J.health=cl(J.health+3,0,100);
    J.log.push('Lionheart: +3 HP at dawn.');
  }
  // Dwarf stone stalker terrain heal
  if(J.comboSkill&&J.comboSkill.terrainHeal&&J.dobj.id===J.comboSkill.terrainHeal.terrain){
    J.health=cl(J.health+J.comboSkill.terrainHeal.val,0,100);
    J.log.push('Stone Stalker: mountain air restores HP.');
  }
  // Halfling bard lucky tune
  if(J.comboSkill&&J.comboSkill.luckTune&&Math.random()<J.comboSkill.luckTune){
    const stats=['health','food','gold','morale'];
    const s=stats[ri(0,3)];
    J[s]=cl(J[s]+20,0,s==='gold'?999:100);
    J.log.push('The Lucky Tune: +20 '+s+'!');
  }
  // Morale floor for Human Bard saga
  if(J.comboSkill&&J.comboSkill.moraleFloor&&J.morale<J.comboSkill.moraleFloor){
    J.morale=J.comboSkill.moraleFloor;
  }

  // Ranger forager
  const forageChance=(J.comboSkill&&J.comboSkill.forageBoost)||((cobj.id==='ranger'||J.prof==='farmer')?0.2:0);
  if(forageChance&&Math.random()<forageChance){
    J.food=cl(J.food+12,0,120);J.log.push('Foraging finds hidden food.');
  }

  // Boss spawn: last 4 days of high-danger routes
  const dangerDest=J.dobj.danger>=3;
  if(dangerDest&&J.daysLeft<=4&&J.daysLeft>1&&!J.bossSpawned&&Math.random()<.55){
    J.bossSpawned=true;
    J.ev={type:'boss',enemy:DRAGON_KNIGHT};
    return;
  }

  // Regular combat check
  const cc=J.dobj.danger*.08;
  // Elf ranger avoidCombat
  if(J.comboSkill&&J.comboSkill.avoidCombat&&Math.random()<J.comboSkill.avoidCombat){
    J.log.push('Ghoststep: you slip past the threat unseen.');
    J.ev=null;
    return;
  }
  // Tiefling fear bonus — bandits may retreat
  if(J.robj.fearBonus&&Math.random()<J.robj.fearBonus){
    J.log.push('Your infernal presence sends a threat fleeing.');
    J.ev=null;
    return;
  }
  if(Math.random()<cc){
    // Halfling sneak: chance to avoid combat
    if(J.robj.sneakBonus&&Math.random()<J.robj.sneakBonus){
      J.log.push('Your small stature lets you slip past unnoticed.');
      J.ev=null;
      return;
    }
    J.ev={type:'combat',enemy:ENEMIES[ri(0,ENEMIES.length-1)]};
  } else {
    const pool=EVENTS.filter(()=>Math.random()<.5);
    // Halfling luck on event outcomes
    let ev=(pool.length&&Math.random()<.65)?pool[ri(0,pool.length-1)]:null;
    J.ev=ev;
  }
}

function checkEnd(){
  if(J.health<=0){J.alive=false;return true;}
  if(J.morale<=0){J.alive=false;return true;}
  if(J.daysLeft<=0){J.arrived=true;return true;}
  return false;
}
function chooseEv(i){
  let eff=JSON.parse(JSON.stringify(J.ev.ef[i]));
  // Halfling eventAvoid (halfling cleric)
  if(J.comboSkill&&J.comboSkill.eventAvoid&&Math.random()<J.comboSkill.eventAvoid){
    J.log.push('Blessed Feet: the worst of it passes you by!');
    eff={};
  }
  applyEff(eff);
  J.log.push(J.ev.t+': chose "'+J.ev.ch[i]+'"');
  J.ev=null;advDay();
  if(checkEnd())go('end');else go('travel');
}
function fleeFromCombat(){
  J.health=cl(J.health-20,0,100);J.gold=cl(J.gold-15,0,999);
  J.log.push('Fled. Lost HP and gold.');
  if(J.ev&&J.ev.enemy&&J.ev.enemy.isBoss)J.log.push('The Dragon Knight watches you flee... he will be at the gates.');
  J.ev=null;advDay();
  if(checkEnd())go('end');else go('travel');
}

function enterCombat(){
  const edef=J.ev.enemy;
  const cid=J.cobj.cid||'knight';
  const cdef=CCLASSES[cid];
  const actions=buildActions(J.robj.id,cid);
  C={
    player:{
      name:J.robj.name+' '+J.cobj.name,icon:J.charIcon,
      imgSrc:J.charImg,
      hp:cdef.hp,maxHp:cdef.hp,ap:cdef.ap,maxAp:cdef.ap,
      statuses:[],shield:0,actions,isPlayer:true,
      raceId:J.robj.id,clsId:cid,comboSkill:J.comboSkill,
      rageCount:J.rageCount,wardDrumBonus:0,wardDrumTurns:0,
      freeRoundUsed:J.freeRoundUsed,
    },
    enemy:{
      name:edef.name,icon:edef.icon,
      imgSrc:enemyImgSrc(edef.imgKey),
      isBoss:!!edef.isBoss,
      hp:edef.hp,maxHp:edef.hp,ap:edef.ap,maxAp:edef.ap,
      statuses:[],shield:0,
      actions:edef.actions.filter(a=>!a.phaseTwo),
      allActions:edef.actions,
      loot:edef.loot,isPlayer:false,
    },
    turn:'player',log:[],round:1,done:false,won:false,
    bossPhaseTwo:false,
  };
  if(edef.isBoss){
    clog('⚔ THE DRAGON KNIGHT stands before the gate!','boss');
    clog('A warrior of pure dragonfire and ancient steel.','boss');
  } else {
    clog('Round 1! '+edef.name+' blocks your path!','sp');
  }
  go('combat');
}

function afterCombat(){
  J.rageCount=C.player.rageCount||0;
  J.ev=null;
  if(checkEnd()){go('end');return;}
  advDay();
  if(checkEnd())go('end');else go('travel');
}

/* ─── Combat helpers ─── */
function applyStatus(tgt,eff){
  if(!eff)return;
  const a=e=>{
    if(e.t==='burn')tgt.statuses.push({type:'burn',v:e.v,turns:e.turns});
    if(e.t==='bleed')tgt.statuses.push({type:'bleed',v:e.v,turns:e.turns});
    if(e.t==='regen')tgt.statuses.push({type:'regen',v:e.v,turns:e.turns});
    if(e.t==='stun'&&Math.random()<e.ch)tgt.statuses.push({type:'stun',turns:1});
    if(e.t==='shield')tgt.shield=Math.max(tgt.shield,e.v);
    if(e.t==='heal')tgt.hp=cl(tgt.hp+e.v,0,tgt.maxHp);
  };
  if(eff.t==='multi')eff.effs.forEach(a);else a(eff);
}

function dealDmg(tgt,raw,pierce){
  let d=raw;
  if(!pierce&&tgt.shield>0){d=Math.max(0,d-tgt.shield);tgt.shield=0;}
  tgt.hp=cl(tgt.hp-d,0,tgt.maxHp);
  return d;
}

function tickSt(unit){
  const msgs=[];
  unit.statuses=unit.statuses.filter(s=>{
    if(s.type==='burn'||s.type==='bleed'){
      const d=dealDmg(unit,s.v);
      msgs.push({t:unit.name+' takes '+d+' from '+s.type+'.',c:unit.isPlayer?'en':'pl'});
      s.turns--;return s.turns>0;
    }
    if(s.type==='regen'){unit.hp=cl(unit.hp+s.v,0,unit.maxHp);msgs.push({t:unit.name+' regens '+s.v+' HP.',c:'sp'});s.turns--;return s.turns>0;}
    return true;
  });
  return msgs;
}

function clog(t,c){C.log.unshift({t,c:c||''});}

function checkBossPhase(){
  const e=C.enemy;
  if(!e.isBoss||C.bossPhaseTwo)return;
  if(e.hp/e.maxHp<=0.5){
    C.bossPhaseTwo=true;
    e.actions=e.allActions; // unlock phase 2 moves
    clog('💥 PHASE II — The Dragon Knight ENRAGES! Fire aura ignites!','boss');
    applyStatus(e,{t:'regen',v:5,turns:99}); // boss regens in phase 2
  }
}

function doAction(aid){
  if(C.turn!=='player'||C.done)return;
  const p=C.player,e=C.enemy;
  const cs=p.comboSkill;

  if(p.statuses.find(s=>s.type==='stun')){
    clog('You are stunned! Turn lost.','sp');
    p.statuses=p.statuses.filter(s=>s.type!=='stun');
    endPT();return;
  }

  const act=p.actions.find(a=>a.id===aid);
  if(!act||p.ap<act.cost)return;

  // Halfling ranger free first round
  const freeRound=(cs&&cs.freeFirstRound&&!p.freeRoundUsed&&C.round===1);
  if(!freeRound)p.ap-=act.cost;
  else{p.freeRoundUsed=true;clog('Burrow Shot: first action costs 0 AP!','sp');}

  // Ward drum passive bonus
  const dmgBonus=(p.wardDrumTurns>0?p.wardDrumBonus:0)+(cs&&cs.roundBonus&&!p.roundBonusUsed?cs.roundBonus:0);
  if(cs&&cs.roundBonus&&!p.roundBonusUsed){p.roundBonusUsed=true;}

  let tot=0;
  const hits=act.hits||1;
  const pierce=!!(cs&&(cs.firstPierce&&C.round===1&&!p.pierceDone));
  if(pierce&&act.dmg[1]>0)p.pierceDone=true;

  for(let i=0;i<hits;i++){
    let base=0;
    if(act.spec==='exec'){
      const thresh=(cs&&cs.execThreshold)||0.4;
      const bon=e.hp<e.maxHp*thresh?Math.floor(e.maxHp*.35):0;
      base=ri(12,18)+bon;
    } else if(act.spec==='pact'){
      // Hellfire Pact: costs 8 HP
      p.hp=Math.max(1,p.hp-8);
      base=ri(act.dmg[0],act.dmg[1]);
      clog('Hellfire Pact: you sacrifice 8 HP for power!','sp');
    } else if(act.spec==='pierce'){
      base=ri(act.dmg[0],act.dmg[1]);
      tot+=dealDmg(e,base+dmgBonus,true);
      continue;
    } else if(act.spec==='bloodheal'){
      // Blood Offering: lose 10 HP, fully heal
      p.hp=Math.max(1,p.hp-10);
      p.hp=p.maxHp;
      clog('Blood Offering: you sacrifice 10 HP to restore full health!','sp');
      if(e.hp<=0){endCombatFn(true);return;}
      if(p.ap<=0)endPT();else render();
      return;
    } else if(act.spec==='wardrum'){
      p.wardDrumBonus=4;p.wardDrumTurns=3;
      clog('War Drums: +4 damage bonus for 3 turns!','sp');
      if(p.ap<=0)endPT();else render();
      return;
    } else if(act.dmg[1]>0){
      base=ri(act.dmg[0],act.dmg[1]);
    }
    if(base>0)tot+=dealDmg(e,base+dmgBonus,pierce);
  }

  // Ward drum turn countdown
  if(p.wardDrumTurns>0)p.wardDrumTurns--;

  if(tot>0)clog('You use '+act.name+' — '+tot+' dmg!','pl');
  else if(act.dmg[1]===0)clog('You use '+act.name+'.','pl');

  // Tiefling knight hellfire edge on-hit burn
  if(cs&&cs.onHitEffect&&tot>0)applyStatus(e,cs.onHitEffect);

  // Half-orc rage stack
  if(cs&&cs.rageStack)p.rageCount=Math.max(0,(p.rageCount||0));

  // Tiefling cleric lifesteal
  if(cs&&cs.lifesteal&&tot>0){
    const heal=Math.floor(tot*cs.lifesteal);
    p.hp=cl(p.hp+heal,0,p.maxHp);
    clog('Hellfire Grace: lifesteal +'+heal+' HP.','sp');
  }

  // Halfling rogue kill heal
  if(cs&&cs.killHeal&&e.hp<=0){
    p.hp=cl(p.hp+cs.killHeal,0,p.maxHp);
    clog('Soul Thief: absorbed '+cs.killHeal+' HP from the kill!','sp');
  }

  if(act.eff){applyStatus(act.eff.tg==='self'?p:e,act.eff);}
  // Tiefling bard cursed verse: mockery also burns
  if(cs&&cs.mockeryBurn&&act.id==='c'){applyStatus(e,{t:'burn',v:3,turns:3,tg:'enemy'});}

  // Bard orc crescendo buff when low HP
  if(cs&&cs.crescendoBuff&&act.id==='d'&&p.hp/p.maxHp<.5){
    const extra=dealDmg(e,cs.crescendoBuff);
    clog('Bloodsong: low HP bonus +'+extra+' extra dmg!','sp');
  }

  // Song cleanse for elf bard
  if(cs&&cs.songCleanse&&act.id==='b'){
    p.statuses=[];clog('Elven Hymn: all status effects cleansed!','sp');
  }

  if(e.hp<=0){endCombatFn(true);return;}
  checkBossPhase();
  if(p.ap<=0)endPT();else render();
}

function endPT(){
  const e=C.enemy;
  tickSt(e).forEach(m=>clog(m.t,m.c));
  if(e.hp<=0){endCombatFn(true);return;}
  checkBossPhase();
  C.turn='enemy';
  // Reset round bonuses
  C.player.roundBonusUsed=false;
  render();
  setTimeout(doET,850);
}

function doET(){
  const p=C.player,e=C.enemy;
  e.ap=e.maxAp;

  // Elf knight parry chance
  const cs=p.comboSkill;
  if(e.statuses.find(s=>s.type==='stun')){
    clog(e.name+' is stunned!','sp');
    e.statuses=e.statuses.filter(s=>s.type!=='stun');
    endET();return;
  }

  // Boss phase 2: use phase 2 actions more
  const availPool=e.isBoss&&C.bossPhaseTwo
    ? e.actions
    : e.actions.filter(a=>!a.phaseTwo);

  while(e.ap>0){
    const avail=availPool.filter(a=>a.cost<=e.ap);
    if(!avail.length)break;
    const act=avail[ri(0,avail.length-1)];
    e.ap-=act.cost;
    let tot=0;
    for(let i=0;i<(act.hits||1);i++){
      if(act.dmg&&act.dmg[1]>0){
        const raw=ri(act.dmg[0],act.dmg[1]);
        // Elf knight parry
        if(cs&&cs.parryChance&&Math.random()<cs.parryChance){
          clog('Moonblade Guard: perfect parry!','sp');
          continue;
        }
        // Halfling knight lucky dodge
        if(cs&&cs.dodgeChance&&Math.random()<cs.dodgeChance){
          clog('Lucky Parry: the hit misses entirely!','sp');
          continue;
        }
        // Dwarf knight free shield (absorbed once)
        if(cs&&cs.freeShield&&!C.freeShieldUsed){
          C.freeShieldUsed=true;
          clog('Runeguard: ancient runes absorb the blow!','sp');
          continue;
        }
        tot+=dealDmg(p,raw);
      }
    }
    if(tot>0){
      clog(e.name+' uses '+act.name+' — '+tot+' dmg!',(e.isBoss?'boss':'en'));
      // Half-orc rage: each hit taken adds to rage
      if(cs&&cs.rageStack){
        p.rageCount=Math.min((p.rageCount||0)+1,3);
        clog('Blood Feud rage: '+(p.rageCount*3)+' bonus dmg stacked.','sp');
      }
    } else if(act.dmg&&act.dmg[0]===0){
      clog(e.name+' uses '+act.name+'.',(e.isBoss?'boss':'en'));
    }
    if(act.eff)applyStatus(act.eff.tg==='self'?e:p,act.eff);
    if(p.hp<=0){endCombatFn(false);return;}
  }
  endET();
}

function endET(){
  tickSt(C.player).forEach(m=>clog(m.t,m.c));
  if(C.player.hp<=0){endCombatFn(false);return;}
  C.round++;C.turn='player';C.player.ap=C.player.maxAp;
  clog('— Round '+C.round+' —','sp');
  render();
}

function endCombatFn(won){
  C.done=true;C.won=won;
  const e=C.enemy;
  if(won){
    const tag=e.isBoss?'boss':'sp';
    clog((e.isBoss?'⚔ THE DRAGON KNIGHT IS SLAIN! GLORY!':'Victory! '+e.name+' falls.'),tag);
    const l=e.loot;
    if(l){J.gold=cl(J.gold+l.g,0,999);J.health=cl(J.health+l.h,0,100);J.food=cl(J.food+l.f,0,120);J.log.push((e.isBoss?'BOSS SLAIN! ':'')+'Loot: '+l.s);}
  } else {
    clog(e.isBoss?'The Dragon Knight defeats you. The gate falls.':'You were defeated!','en');
    J.health=Math.max(0,J.health-30);J.morale=Math.max(0,J.morale-20);
    J.log.push('Combat lost. Fled wounded (-30 HP, -20 morale).');
  }
  render();
}

function combUnit(u,showAP){
  const pct=Math.round(u.hp/u.maxHp*100),col=hc(u.hp,u.maxHp);
  let stags='';
  if(u.shield>0&&u.shield<99)stags+='<span class="stag sb">Shield '+u.shield+'</span> ';
  if(u.shield>=99)stags+='<span class="stag sb">Dodge</span> ';
  u.statuses.forEach(s=>{
    if(s.type==='burn')stags+='<span class="stag sy">Burn '+s.turns+'t</span> ';
    if(s.type==='bleed')stags+='<span class="stag sr">Bleed '+s.turns+'t</span> ';

      +'</div><br>'
      +'<button class="btn btnp" onclick="sel={race:null,cls:null,prof:null,dest:null};go(\'title\')">Play Again</button>'
      +'</div>';
  },
};

function render(){document.getElementById('app').innerHTML=SCREENS[W]();}
render();
</script>
